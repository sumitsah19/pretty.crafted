spring.application.name=giftbox
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/prettycrafted?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&sessionVariables=sql_mode=NO_ENGINE_SUBSTITUTION}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# DANGER: ddl-auto=update silently alters/drops columns in production.
# Set DDL_AUTO=validate in production and rely on Flyway migrations for schema changes.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server
server.port=${PORT:8080}

# Virtual threads (Java 21 + Spring Boot 3.4) — Tomcat handles each HTTP request on a
# virtual thread, and the framework task scheduler uses virtual threads too. Request-path
# work here is blocking JDBC/Hibernate, which unmounts cleanly off the carrier — ideal for
# virtual threads and a large native-memory saving vs. a fixed platform-thread pool.
# NOTE: the @Async email/PDF pool is deliberately left on PLATFORM threads (see AsyncConfig)
# — PDFBox is CPU/memory-heavy and may use internal synchronized blocks that would pin a
# carrier thread on Java 21, so it must not run on virtual threads.
spring.threads.virtual.enabled=${VIRTUAL_THREADS_ENABLED:true}

# JWT
# Production: override with a strong random value via JWT_SECRET env var
# Local default below is intentionally weak — never use in production
app.jwt.secret=${JWT_SECRET:local-dev-only-secret-not-for-production-use}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
# Production: set CORS_ALLOWED_ORIGINS=https://prettycrafted.com on Railway
# Multiple origins: CORS_ALLOWED_ORIGINS=https://prettycrafted.com,https://www.prettycrafted.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001,https://prettycrafted.com,https://www.prettycrafted.com}

# Auth cookie — set COOKIE_SECURE=false for local HTTP dev; must be true in production (HTTPS)
app.cookie.secure=${COOKIE_SECURE:true}

# Seed admin — required on first startup; set SEED_ADMIN_PASSWORD env var
app.seed.admin-password=${SEED_ADMIN_PASSWORD:}

# Google OAuth2
app.google.client-id=${GOOGLE_CLIENT_ID:}

# MSG91 phone OTP — server re-verifies the widget access token via
# control.msg91.com/api/v5/widget/verifyAccessToken. The secret AuthKey lives
# only here, never in the frontend. Blank = phone OTP login disabled.
msg91.auth-key=${MSG91_AUTH_KEY:}


# Razorpay
app.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder}
# Webhook secret — get from Razorpay Dashboard → Webhooks → Secret
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# Resend — HTTP API for transactional email (replaces SMTP)
# 1. Sign up at resend.com (free: 3 000 emails/month)
# 2. Add & verify prettycrafted.com under Resend → Domains
# 3. Create an API key and set RESEND_API_KEY on Railway
# Blank key = dev mode (emails logged to console, never sent)
app.resend.api-key=${RESEND_API_KEY:}
app.mail.from=${MAIL_FROM:support@prettycrafted.com}

# Dev-only tooling (e.g. EmailTestController's real-send test endpoint under
# /api/dev/**, which is permitAll() in SecurityConfig). Requires BOTH
# @Profile("local") AND this to be true — never set outside local dev.
app.dev-tools.enabled=${DEV_TOOLS_ENABLED:false}

# OpenAPI / Swagger — disabled by default; set SWAGGER_ENABLED=true for local dev only
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Flyway — disabled locally (ddl-auto=update handles schema); enable in production with FLYWAY_ENABLED=true
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Cloudinary — set these three env vars on Railway
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Frontend URL (shown to customers; not used for links to backend-only routes)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Backend API URL — frontend and API are on different domains in production
# (see frontend's VITE_API_BASE_URL), so links to backend-only routes like the
# email unsubscribe link must use THIS, not app.frontend.url.
app.api.url=${API_URL:http://localhost:8080}

# Sentry — disabled by default (blank DSN = no-op). Set SENTRY_DSN env var to enable.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SPRING_PROFILES_ACTIVE:local}
sentry.traces-sample-rate=0.2
sentry.send-default-pii=false
sentry.exception-resolver-order=-2147483647
