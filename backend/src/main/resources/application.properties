spring.application.name=giftbox

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/prettycrafted?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# Local default: update (Hibernate auto-creates/alters tables — safe for dev)
# Production: set DDL_AUTO=validate and rely on Flyway migrations instead
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server
server.port=${PORT:8080}

# JWT
# Production: override with a strong random value via JWT_SECRET env var
# Local default below is intentionally weak — never use in production
app.jwt.secret=${JWT_SECRET:local-dev-only-secret-not-for-production-use}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001}

# Auth cookie — set COOKIE_SECURE=false for local HTTP dev; must be true in production (HTTPS)
app.cookie.secure=${COOKIE_SECURE:true}

# Google OAuth2
app.google.client-id=${GOOGLE_CLIENT_ID:953914500614-1m334hgrmvk4ot75mb3cr06mhi1ktfkj.apps.googleusercontent.com}


# Razorpay
app.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@prettycrafted.in}

# OpenAPI / Swagger — disabled by default; set SWAGGER_ENABLED=true for local dev only
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Flyway — disabled locally (ddl-auto=update handles schema); enable in production with FLYWAY_ENABLED=true
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# File upload
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Frontend URL (used for unsubscribe links in emails)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Sentry
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=1.0
sentry.exception-resolver-order=-2147483647

# Disable Sentry locally to avoid startup incompatibility with Sentry starter
# Enable in production by setting SENTRY_DSN and removing/overriding this property
sentry.enabled=false
