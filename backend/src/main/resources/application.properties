spring.application.name=giftbox

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/prettycrafted?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&sessionVariables=sql_mode=NO_ENGINE_SUBSTITUTION}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# DANGER: ddl-auto=update silently alters/drops columns in production.
# Set DDL_AUTO=validate in production and rely on Flyway migrations for schema changes.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server
server.port=${PORT:8080}

# JWT
# Production: override with a strong random value via JWT_SECRET env var
# Local default below is intentionally weak — never use in production
app.jwt.secret=${JWT_SECRET:local-dev-only-secret-not-for-production-use}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
# Production: set CORS_ALLOWED_ORIGINS=https://prettycrafted.com on Railway
# Multiple origins: CORS_ALLOWED_ORIGINS=https://prettycrafted.com,https://www.prettycrafted.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001,https://prettycrafted.com,https://www.prettycrafted.com}

# Auth cookie — set COOKIE_SECURE=false for local HTTP dev; must be true in production (HTTPS)
app.cookie.secure=${COOKIE_SECURE:true}

# Seed admin — required on first startup; set SEED_ADMIN_PASSWORD env var
app.seed.admin-password=${SEED_ADMIN_PASSWORD:}

# Google OAuth2
app.google.client-id=${GOOGLE_CLIENT_ID:}


# Razorpay
app.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder}
# Webhook secret — get from Razorpay Dashboard → Webhooks → Secret
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# Mail — Hostinger SMTP
# MAIL_PORT=465 uses SSL directly; MAIL_PORT=587 uses STARTTLS
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
# SSL (port 465)
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=*
# STARTTLS (port 587) — enable this if using port 587
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
app.mail.from=${MAIL_FROM:support@prettycrafted.com}

# OpenAPI / Swagger — disabled by default; set SWAGGER_ENABLED=true for local dev only
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Flyway — disabled locally (ddl-auto=update handles schema); enable in production with FLYWAY_ENABLED=true
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# File upload
app.upload.dir=${UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Frontend URL (used for unsubscribe links in emails)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Sentry — disabled by default (blank DSN = no-op). Set SENTRY_DSN env var to enable.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SPRING_PROFILES_ACTIVE:local}
sentry.traces-sample-rate=0.2
sentry.send-default-pii=false
sentry.exception-resolver-order=-2147483647
