<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- ── Theme / mobile ───────────────────────────────────────── -->
    <meta name="theme-color" content="#C4704A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pretty.Crafted" />

    <!-- ── Primary (baseline fallback before React hydrates) ────── -->
    <title>Pretty.Crafted — Handcrafted Gifts with Heart</title>
    <meta name="description" content="Handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions. Shop unique gifts made with love by independent artisans." />
    <meta name="keywords" content="handcrafted gifts, personalized gift boxes, artisan gifts, birthday gifts India, anniversary gifts, custom gift hampers, prettycrafted" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://prettycrafted.com/" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn preview) ────── -->
    <meta property="og:site_name" content="Pretty.Crafted" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prettycrafted.com/" />
    <meta property="og:title" content="Pretty.Crafted — Handcrafted Gifts with Heart" />
    <meta property="og:description" content="Handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions. Shop unique gifts made with love." />
    <meta property="og:image" content="https://prettycrafted.com/logo.png" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:image:alt" content="Pretty.Crafted — Handcrafted Gift Boxes" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ─────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pretty.Crafted — Handcrafted Gifts with Heart" />
    <meta name="twitter:description" content="Handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions." />
    <meta name="twitter:image" content="https://prettycrafted.com/logo.png" />

    <!-- ── Fonts ────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

    <!-- ── Structured Data: Organization + Website ──────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://prettycrafted.com/#organization",
          "name": "Pretty.Crafted",
          "url": "https://prettycrafted.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://prettycrafted.com/logo.png",
            "width": 1080,
            "height": 1080
          },
          "description": "Handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions.",
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "IN"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "email": "hello@prettycrafted.com"
          },
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://prettycrafted.com/#website",
          "url": "https://prettycrafted.com",
          "name": "Pretty.Crafted",
          "description": "Handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions.",
          "publisher": { "@id": "https://prettycrafted.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://prettycrafted.com/?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
