<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ──────────────────────────────────────────────── -->
    <!-- ICO first: fallback for older browsers and Google SERP favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- SVG override: modern browsers pick this over the ICO above -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <!-- Apple home-screen icon -->
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- ── Google Search Console ownership verification ────────── -->
    <!-- REPLACE the content value below with your actual verification code from -->
    <!-- https://search.google.com/search-console → Add Property → HTML tag method -->
    <!-- <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" /> -->

    <!-- ── Theme / mobile ───────────────────────────────────────── -->
    <meta name="theme-color" content="#C4704A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Prettycrafted" />

    <!-- ── Primary (baseline fallback before React hydrates) ────── -->
    <title>Prettycrafted | Crafted with love</title>
    <meta name="description" content="Prettycrafted — shop handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions. Unique artisan gifts made with love, delivered across India." />
    <meta name="keywords" content="Prettycrafted, prettycrafted gifts, handcrafted gifts India, personalized gift boxes, artisan gifts, birthday gifts India, anniversary gifts, custom gift hampers" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://prettycrafted.com/" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn preview) ────── -->
    <meta property="og:site_name" content="Prettycrafted" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prettycrafted.com/" />
    <meta property="og:title" content="Prettycrafted | Crafted with love" />
    <meta property="og:description" content="Prettycrafted — shop handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions. Unique artisan gifts made with love." />
    <meta property="og:image" content="https://prettycrafted.com/logo.svg" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:image:alt" content="Prettycrafted — Handcrafted Gift Boxes" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ─────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@prettycrafted" />
    <meta name="twitter:title" content="Prettycrafted | Crafted with love" />
    <meta name="twitter:description" content="Shop handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions at Prettycrafted." />
    <meta name="twitter:image" content="https://prettycrafted.com/logo.svg" />

    <!-- ── Fonts ────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

    <!-- ── Structured Data: Organization + WebSite + OnlineStore ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://prettycrafted.com/#organization",
          "name": "Prettycrafted",
          "alternateName": ["Pretty Crafted", "Pretty.Crafted", "prettycrafted.com"],
          "url": "https://prettycrafted.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://prettycrafted.com/logo.svg",
            "width": 1080,
            "height": 1080
          },
          "description": "Prettycrafted offers handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions.",
          "foundingDate": "2024",
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "IN"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "email": "hello@prettycrafted.com"
          },
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://prettycrafted.com/#website",
          "url": "https://prettycrafted.com",
          "name": "Prettycrafted",
          "alternateName": "Pretty Crafted",
          "description": "Prettycrafted — handcrafted personalized gift boxes for birthdays, anniversaries, and special occasions.",
          "publisher": { "@id": "https://prettycrafted.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://prettycrafted.com/?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "OnlineStore",
          "@id": "https://prettycrafted.com/#store",
          "name": "Prettycrafted",
          "alternateName": "Pretty Crafted",
          "url": "https://prettycrafted.com",
          "description": "Prettycrafted is an online store offering handcrafted personalized gift boxes and artisan gifts across India.",
          "image": "https://prettycrafted.com/logo.svg",
          "priceRange": "₹₹",
          "currenciesAccepted": "INR",
          "paymentAccepted": "Credit Card, Debit Card, UPI, Net Banking",
          "areaServed": "IN"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
